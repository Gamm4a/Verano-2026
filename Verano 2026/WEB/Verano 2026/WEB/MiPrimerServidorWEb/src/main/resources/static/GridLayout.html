<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .contenedor{
            display: grid;
            grid-template-columns: 100px 100px 100px;
            gap: 10px;

            border: 2px solid blue;
            pading: 10px;

            .caja{

                height: 100px;
                background-color: #0056b3;
                border:2px solid blue;
                display: flex;
                justify-content: center;
                align-items: center
            }

            .parent{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(4, 100px);
                gap: 10px;
                width: 500px;
            }

            .parent div{
                border: 1px solid black;
                background-color: #0056b3;
            }

            .div1{
                grid-area: 1/1/3/2;
                /*
                Empieza en la fila 1 columna 1
                Termina antes de llegar a la fila 3 y la columna 2
                 */

            }

            .div2{
                grid-area: 1/2/3/4;
                /*
                Empieza en la fila 1 columna 2
                Termina antes de llegar a la fila 3 y la columna 4
                */
            }

            .div3{
                grid-area: 1/4/2/5;
                /*
                Empieza en la fila 1 columna 4
                Termina antes de llegar a la fila 2 y la columna 5
                */
            }

            .div4{
                grid-area: 2/4/3/5;
                /*
                Empieza en la fila 2 columna 4
                Termina antes de llegar a la fila 3 y la columna 5
                */
            }
            .div5{
                grid-area: 3/1/5/3;
                /*
                Empieza en la fila 3 columna 1
                Termina antes de llegar a la fila 5 y la columna 3
                */
            }
            .div6{
                grid-area: 4/3/5/5;
                /*
                Empieza en la fila 4 columna 3
                Termina antes de llegar a la fila 5 y la columna 5
                */
            }

            .div6{
                grid-area: 3/3/5/4;
                /*
                Empieza en la fila 3 columna 3
                Termina antes de llegar a la fila 5 y la columna 4
                */
            }

        }

    </style>


</head>
<body>

    <div class="contenedor">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
        <div class="caja">4</div>
        <div class="caja">5</div>
        <div class="caja">6</div>


    </div>

    <div class="parent">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
        <div class="div5">5</div>
        <div class="div6">6</div>
        <div class="div7">7</div>

    </div>


</body>
</html>
