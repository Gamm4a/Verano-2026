<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            
            <!-- TAREA PARA EL ALUMNO:
                 Crea un formulario que envíe los datos mediante POST a "/crear-cuenta".
                 Debe contener campos para:
                 - Nombre completo (texto)
                 - Correo electrónico (email)
                 - Contraseña (password)
                 - Pseudónimo (texto con patrón de validación: [letras de 3 a 10]-[números de 2 a 10])
                 - Género (radio buttons: Femenino, Masculino, Otro)
                 - Tipo de Suscripción (select: Gratis, Premium Mensual, Premium Anual)
                 - Fecha de nacimiento (date)
                 - Aceptar términos y condiciones (checkbox)
                 - Comentarios adicionales o gustos (textarea)
            -->
            <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
                <h2>Crear Cuenta</h2>

                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text"
                           id="nombre"
                           name="nombre"
                           placeholder="ej. Ember"
                           required
                           minlength="3"
                           maxlength="100">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electronico:</label>
                    <input type="email"
                           id="correo"
                           name="correo"
                           placeholder="EmberGUI@gmail.com">
                </div>

                <div class="form-group">
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password"
                           id="contrasenia"
                           name="contrasenia"
                           placeholder="Minimo 8 caracteres"
                           required
                           min="8">

                </div>
                <div class="form-group">
                    <label for="txt_pseudonimo">Pseudonimo</label>
                    <input type="text" id="txt_pseudonimo"
                           name="txt_pseudonimo"
                           required
                           placeholder="Nebula-2025"
                           pattern="[a-zA-Z]{3,10}-[0-9]{2,10}"
                    >
                </div>
                <div>
                    <label>Genero</label>
                    <div>
                        <input type="radio" id="rad_femenino" name="rad_genero" value="Femenino" required>
                        <label for="rad_femenino">Femenino</label>
                        <input type="radio" id="rad_masculino" name="rad_genero" value="masculino" required>
                        <label for="rad_masculino">Masculino</label>
                        <input type="radio" id="rad_otro" name="rad_genero" value="otro" required>
                        <label for="rad_otro">Ni fu ni fa</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="sel_suscripcion">Tipo de Suscripción</label>
                    <select name="sel_suscripcion" id="sel_suscripcion" required>
                        <option value="">--Selecciona una opcion</option>
                        <option value="Gratis">Gratuito</option>
                        <option value="premiun_mensual">Premiun Mensual ($99/mes)</option>
                        <option value="premiun_anual">Premiun Anual ($899/mes)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fechaNacimiento">Fecha Nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>
                <div class="form-group">
                    <label for="comentarios">Comentarios o Gustos</label>
                    <textarea name="comentarios" id="comentarios" cols="40" rows="4" placeholder="Cuentanos que musica te gusta"></textarea>
                </div>

                <div class="form-group">
                    <input type="checkbox" required id="terminos" name="chk_terminos" value="Aceptado">
                    <label for="terminos">Acepto los terminos y condiciones</label>
                </div>

                <div class="form-group">
                    <button type="submit">Registrarse</button>
                    <button type="reset"> Limpiar el Formulario</button>

                </div>
            </form>

            <p><strong>¿Ya tienes una cuenta?</strong></p><a href="iniciar-sesion.html">Inicia sesión aquí</a>

        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
