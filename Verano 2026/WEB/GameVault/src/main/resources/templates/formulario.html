<th:block th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
    <title>Subir Juego - GameVault</title>
    <main class="container">
        <div class="panel" style="max-width: 600px; margin: 0 auto;">

            <h2 class="text-gradient" style="margin-top: 0;">Añadir Nuevo Juego</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">
                Sube la información y la portada de un nuevo juego a la bóveda.
            </p>

            <form action="/juegos" enctype="multipart/form-data" method="post">

                <div class="form-group">
                    <label class="form-label" for="titulo">Título del Juego</label>
                    <input class="form-control" id="titulo" name="titulo" required type="text">
                </div>

                <div class="form-group">
                    <label class="form-label" for="descripcion">Descripción Breve</label>
                    <textarea class="form-control" id="descripcion" name="descripcion" required rows="4"
                              style="resize: vertical;"></textarea>
                </div>

                <div class="form-group"
                     style="background-color: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border: 1px dashed var(--primary);">
                    <label class="form-label" for="portada" style="color: var(--primary);">
                        📸 Subir Portada (Imagen)
                    </label>

                    <input accept="image/*" class="form-control" id="portada" name="portada" required style="border: none; background: transparent; padding-left: 0;"
                           type="file">

                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; margin-bottom: 0;">
                        El tamaño máximo configurado en el servidor es de <b>2MB</b> por archivo.
                    </p>
                </div>

                <button class="btn btn-primary" style="margin-top: 10px; width: 100%;" type="submit">
                    Guardar en la Bóveda
                </button>
            </form>
        </div>
    </main>
</th:block>
